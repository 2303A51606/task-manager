<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .add { background: #28a745; color: white; }
        .doneBtn { background: #007bff; color: white; }
        .deleteBtn { background: #dc3545; color: white; }

        li {
            list-style: none;
            margin: 10px 0;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 5px;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        .filters button {
            background: #ddd;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Task Manager 🚀</h2>

    <input id="task" placeholder="Enter task" 
           onkeypress="if(event.key==='Enter') addTask()">
    <button class="add" onclick="addTask()">Add</button>

    <p id="count"></p>

    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('pending')">Pending</button>
        <button onclick="filterTasks('done')">Completed</button>
    </div>

    <button onclick="clearAll()">Clear All</button>

    <ul id="list"></ul>
</div>

<script>
const API = "https://task-app.onrender.com/tasks";
let allTasks = [];
let currentFilter = "all";

async function loadTasks() {
    const res = await fetch(API);
    allTasks = await res.json();
    displayTasks();
}

function displayTasks() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    let filtered = allTasks;

    if (currentFilter === "done")
        filtered = allTasks.filter(t => t.done);
    else if (currentFilter === "pending")
        filtered = allTasks.filter(t => !t.done);

    document.getElementById("count").innerText =
        `Total: ${allTasks.length}`;

    filtered.forEach(t => {
        const li = document.createElement("li");
        li.className = t.done ? "done" : "";

        li.innerHTML = `
            ${t.text}
            <button class="doneBtn" onclick="toggle(${t.id})">✔</button>
            <button class="deleteBtn" onclick="removeTask(${t.id})">❌</button>
        `;

        list.appendChild(li);
    });
}

async function addTask() {
    const input = document.getElementById("task");
    const text = input.value;

    if (!text) return;

    await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
    });

    input.value = "";
    loadTasks();
}

async function toggle(id) {
    await fetch(API + "/" + id, { method: "PUT" });
    loadTasks();
}

async function removeTask(id) {
    await fetch(API + "/" + id, { method: "DELETE" });
    loadTasks();
}

function filterTasks(type) {
    currentFilter = type;
    displayTasks();
}

async function clearAll() {
    for (let t of allTasks) {
        await fetch(API + "/" + t.id, { method: "DELETE" });
    }
    loadTasks();
}

loadTasks();
</script>

</body>
</html>
